name: Build Windows exe

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0
  UI_TARS_APP_PRIVATE_KEY_BASE64: ""

jobs:
  build_win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch vite config
        shell: bash
        run: |
          node -e '
          const fs = require("fs");
          const p = "apps/ui-tars/electron.vite.config.ts";
          let c = fs.readFileSync(p, "utf8");
          c = c.replace(/bytecodePlugin\(\{[\s\S]*?\}\)/, "() => ({ name: \"skip-bytecode\" })");
          c = c.replace("externalizeDepsPlugin({", "externalizeDepsPlugin({ exclude: [\"electron-debug\"],");
          fs.writeFileSync(p, c);
          '

      - name: Build and package
        run: cd apps/ui-tars && pnpm run build:dist && pnpm run make

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0-latest-win-build
          name: "UI TARS Desktop (Latest Windows Build)"
          body: "UI TARS Desktop latest Windows exe installer, built from main branch via GitHub Actions."
          files: apps/ui-tars/out/make/**/*
