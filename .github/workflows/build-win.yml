name: Build Windows exe

on:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0
  UI_TARS_APP_PRIVATE_KEY_BASE64: ""

jobs:
  build_win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.3.0

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch vite config
        run: |
          node -e "
          const fs = require('fs');
          const p = 'apps/ui-tars/electron.vite.config.ts';
          let c = fs.readFileSync(p, 'utf8');
          c = c.replace(/bytecodePlugin\(\{[\s\S]*?\}\)/, \"() => ({ name: 'skip-bytecode' })\");
          c = c.replace('externalizeDepsPlugin({', \"externalizeDepsPlugin({ exclude: ['electron-debug'],\");
          fs.writeFileSync(p, c);
          "

      - name: Build and package
        run: cd apps/ui-tars && pnpm run build:dist && pnpm run make

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: UI-TARS-Windows-exe
          path: apps/ui-tars/out/make/
